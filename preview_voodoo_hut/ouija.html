<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Spirit Board | The Voodoo Hut</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    body { background: #0a0005; color: #e8dcc8; font-family: 'Open Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
    .ouija-page { min-height: 100vh; padding-bottom: 80px; position: relative; }

    #ouija-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

    /* ── HEADER ── */
    .ouija-header { text-align: center; padding: 60px 20px 20px; position: relative; z-index: 10; }
    .ouija-header .site-logo { font-family: 'Cinzel Decorative', serif; font-size: clamp(2rem, 5vw, 3.5rem); color: #8b0000; text-shadow: 0 0 30px rgba(139,0,0,0.8), 0 0 60px rgba(139,0,0,0.4); letter-spacing: 4px; display: block; text-decoration: none; margin-bottom: 8px; }
    .ouija-header .site-logo:hover { color: #cc0000; }
    .ouija-header .oracle-subtitle { font-family: 'Cinzel', serif; font-size: clamp(0.9rem, 2vw, 1.2rem); color: #8b6914; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 6px; }
    .ouija-header .oracle-whisper { font-family: 'Cinzel', serif; font-style: italic; font-size: 0.85rem; color: #6b5a8a; letter-spacing: 2px; }

    /* ── BOARD WRAP ── */
    .board-wrap { max-width: 820px; margin: 24px auto 0; padding: 0 16px; position: relative; z-index: 10; }

    /* ── SPIRIT BOARD ── */
    .spirit-board {
      position: relative;
      width: 100%;
      background:
        radial-gradient(ellipse at 15% 25%, rgba(90,35,0,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 75%, rgba(70,25,0,0.5) 0%, transparent 55%),
        linear-gradient(155deg, #3e1800 0%, #220e00 35%, #311500 65%, #1c0900 100%);
      border-radius: 18px;
      border: 3px solid #c9a227;
      box-shadow:
        0 0 0 6px rgba(10,0,5,0.9),
        0 0 0 8px rgba(201,162,39,0.15),
        0 0 60px rgba(139,0,0,0.25),
        0 0 120px rgba(139,0,0,0.1);
      padding: 18px 12px 20px;
    }
    .spirit-board::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(201,162,39,0.22);
      border-radius: 12px;
      pointer-events: none;
      z-index: 1;
    }

    /* ── BOARD TOP ── */
    .board-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 4px 8px 6px;
      position: relative;
      z-index: 2;
    }
    .board-corner { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 52px; }
    .board-corner-symbol { font-size: clamp(1.2rem, 3vw, 1.8rem); opacity: 0.75; line-height: 1; }
    .board-yes-no {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 3.2vw, 1.9rem);
      color: #e8dcc8;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(232,220,200,0.3);
      line-height: 1;
    }
    .board-title-area { text-align: center; flex: 1; padding: 0 8px; }
    .board-title-main {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.7rem, 2.2vw, 1.25rem);
      color: #c9a227;
      letter-spacing: 3px;
      text-shadow: 0 0 14px rgba(201,162,39,0.5);
      display: block;
      line-height: 1.3;
    }
    .board-title-sub {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.5rem, 1vw, 0.65rem);
      color: rgba(201,162,39,0.55);
      letter-spacing: 2px;
      display: block;
      margin-top: 3px;
    }

    /* ── DIVIDER ── */
    .board-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(201,162,39,0.35), transparent); margin: 4px 10px; position: relative; z-index: 2; }

    /* ── LETTER / NUMBER ROWS ── */
    .letters-row, .numbers-row {
      display: flex;
      justify-content: center;
      padding: 3px 4px;
      position: relative;
      z-index: 2;
    }

    /* ── BOARD KEY ── */
    .board-key {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.7rem, 1.5vw, 1.05rem);
      color: #c9a227;
      width: clamp(20px, 3.6vw, 40px);
      text-align: center;
      padding: 5px 0;
      line-height: 1;
      transition: color 0.15s, text-shadow 0.15s;
      user-select: none;
    }
    .board-key.lit {
      color: #fff8e0;
      text-shadow: 0 0 10px rgba(255,240,180,0.95), 0 0 22px rgba(201,162,39,0.85);
    }

    /* ── YES / NO special styling ── */
    #key-YES, #key-NO {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 3.2vw, 1.9rem);
      color: #e8dcc8;
      width: auto;
      padding: 0;
      letter-spacing: 1px;
      line-height: 1;
    }
    #key-YES.lit, #key-NO.lit {
      color: #fff;
      text-shadow: 0 0 14px rgba(255,255,255,0.95), 0 0 30px rgba(201,162,39,0.9);
    }

    /* ── HELLO / GOODBYE row ── */
    .board-greet-row { display: flex; justify-content: center; align-items: center; gap: clamp(12px, 4vw, 36px); padding: 5px 0 2px; position: relative; z-index: 2; }
    .board-greet-sep { color: rgba(201,162,39,0.35); font-size: 0.65rem; }
    #key-HELLO, #key-GOODBYE {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.75rem, 1.8vw, 1.1rem);
      color: #c9a227;
      letter-spacing: 5px;
      width: auto;
    }
    #key-HELLO.lit, #key-GOODBYE.lit {
      color: #fff8e0;
      text-shadow: 0 0 14px rgba(255,240,180,0.95), 0 0 28px rgba(201,162,39,0.85);
    }

    /* ── PLANCHETTE ── */
    .planchette {
      position: absolute;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, rgba(80,0,30,0.65) 0%, rgba(8,0,4,0.93) 68%);
      border: 2px solid rgba(201,162,39,0.72);
      box-shadow:
        0 0 14px rgba(139,0,0,0.75),
        0 0 28px rgba(139,0,0,0.38),
        inset 0 0 10px rgba(139,0,0,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
      transition:
        left 0.9s ease,
        top  0.9s ease,
        opacity 0.4s;
    }
    .planchette-ring {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(201,162,39,0.38);
      display: flex; align-items: center; justify-content: center;
    }
    .planchette-eye {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180,0,40,0.55) 0%, transparent 80%);
      border: 1px solid rgba(201,162,39,0.48);
    }
    @keyframes planchette-breathe {
      0%, 100% { box-shadow: 0 0 14px rgba(139,0,0,0.75), 0 0 28px rgba(139,0,0,0.38), inset 0 0 10px rgba(139,0,0,0.22); }
      50% { box-shadow: 0 0 22px rgba(200,0,0,0.9), 0 0 46px rgba(200,0,0,0.5), inset 0 0 16px rgba(200,0,0,0.4); }
    }
    .planchette.seeking { animation: planchette-breathe 1.1s ease-in-out infinite; }

    /* ── QUESTION FORM ── */
    .question-wrap { max-width: 600px; margin: 22px auto 0; padding: 0 20px; position: relative; z-index: 10; }
    .question-card { background: rgba(10,0,5,0.85); border: 1px solid rgba(139,0,0,0.4); border-radius: 12px; padding: 24px 28px; box-shadow: 0 0 30px rgba(139,0,0,0.12); }
    .question-label { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: #8b6914; display: block; margin-bottom: 8px; }
    .question-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(139,0,0,0.35); border-radius: 6px; padding: 12px 14px; color: #e8dcc8; font-family: 'Open Sans', sans-serif; font-size: 0.9rem; box-sizing: border-box; transition: border-color 0.3s, box-shadow 0.3s; }
    .question-input:focus { outline: none; border-color: #8b0000; box-shadow: 0 0 12px rgba(139,0,0,0.3); }
    .question-input::placeholder { color: rgba(232,220,200,0.3); }
    .ask-btn { width: 100%; padding: 15px; background: #8b0000; color: #f5e6c8; font-family: 'Cinzel', serif; font-size: 0.95rem; letter-spacing: 4px; text-transform: uppercase; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
    .ask-btn:hover { background: #aa0000; box-shadow: 0 0 20px rgba(139,0,0,0.5); }
    .ask-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ask-btn.shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .error-msg { color: #cc4444; font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 1px; margin-top: 10px; text-align: center; display: none; }
    .error-msg.visible { display: block; }

    /* ── RESPONSE ── */
    .response-wrap { max-width: 600px; margin: 20px auto 0; padding: 0 20px; text-align: center; position: relative; z-index: 10; min-height: 60px; }
    .response-eyebrow { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 5px; color: #6b5a8a; text-transform: uppercase; margin: 0 0 8px; opacity: 0; transition: opacity 0.5s; }
    .response-answer { font-family: 'Cinzel Decorative', serif; font-size: clamp(1.3rem, 4vw, 2rem); color: #c9a227; letter-spacing: 6px; text-shadow: 0 0 20px rgba(201,162,39,0.5); margin: 0; opacity: 0; transition: opacity 0.5s; }
    .response-eyebrow.visible, .response-answer.visible { opacity: 1; }

    /* ── RADIO BAR ── */
    .radio-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,0,5,0.95); border-top: 1px solid rgba(139,0,0,0.3); display: flex; align-items: center; gap: 12px; padding: 8px 16px; }
    .radio-bar-btn { background: none; border: 1px solid #8b0000; color: #e8dcc8; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; flex-shrink: 0; }
    .radio-bar-info { flex: 1; min-width: 0; }
    .radio-bar-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 2px; color: #8b6914; display: block; }
    .radio-bar-track { font-size: 0.75rem; color: #e8dcc8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .radio-bar-volume { width: 70px; flex-shrink: 0; }
    .radio-bar-link { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 2px; color: #8b6914; text-decoration: none; flex-shrink: 0; }
    .radio-bar-link:hover { color: #c9a227; }
  </style>
</head>
<body>
<div class="ouija-page">
  <canvas id="ouija-particles"></canvas>

  <header class="ouija-header">
    <a href="home.html" class="site-logo">THE VOODOO HUT</a>
    <p class="oracle-subtitle">Spirit Board</p>
    <p class="oracle-whisper">Place your hands upon the planchette and ask</p>
  </header>

  <div class="board-wrap">
    <div class="spirit-board" id="spirit-board">

      <!-- TOP: YES / TITLE / NO -->
      <div class="board-top">
        <div class="board-corner">
          <span class="board-corner-symbol">☀</span>
          <span id="key-YES" class="board-key board-yes-no">YES</span>
        </div>
        <div class="board-title-area">
          <span class="board-title-main">VOODOO SPIRIT BOARD</span>
          <span class="board-title-sub">The Voodoo Hut · Kemah, Texas</span>
        </div>
        <div class="board-corner">
          <span class="board-corner-symbol">☾</span>
          <span id="key-NO" class="board-key board-yes-no">NO</span>
        </div>
      </div>

      <div class="board-divider"></div>

      <!-- ALPHABET ROWS (built by JS) -->
      <div class="letters-row" id="letters-row-1"></div>
      <div class="letters-row" id="letters-row-2"></div>

      <div class="board-divider"></div>

      <!-- NUMBERS ROW (built by JS) -->
      <div class="numbers-row" id="numbers-row"></div>

      <div class="board-divider"></div>

      <!-- HELLO / GOODBYE -->
      <div class="board-greet-row">
        <span id="key-HELLO" class="board-key">HELLO</span>
        <span class="board-greet-sep">✦</span>
        <span id="key-GOODBYE" class="board-key">GOODBYE</span>
      </div>

      <!-- PLANCHETTE -->
      <div class="planchette" id="planchette" style="opacity:0;left:0;top:0;">
        <div class="planchette-ring"><div class="planchette-eye"></div></div>
      </div>

    </div>
  </div>

  <!-- QUESTION FORM -->
  <div class="question-wrap">
    <div class="question-card">
      <label class="question-label" for="spirit-question">Ask the spirits</label>
      <input type="text" id="spirit-question" class="question-input" placeholder="What do you wish to know?" maxlength="120" />
      <button class="ask-btn" id="ask-btn" onclick="askSpirits()">Summon the Answer</button>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <!-- RESPONSE -->
  <div class="response-wrap">
    <p class="response-eyebrow" id="response-eyebrow">The spirits say</p>
    <p class="response-answer" id="response-answer"></p>
  </div>

  <!-- RADIO BAR -->
  <div class="radio-bar" id="radio-bar">
    <button class="radio-bar-btn" id="radio-play-bar" aria-label="Play/Pause Radio">&#9654;</button>
    <div class="radio-bar-info">
      <span class="radio-bar-label">Voodoo Hut Radio</span>
      <span class="radio-bar-track" id="radio-bar-track">Loading...</span>
    </div>
    <input type="range" id="radio-volume-bar" min="0" max="1" step="0.01" value="0.7" class="radio-bar-volume" aria-label="Volume" />
    <a href="radio.html" class="radio-bar-link">Full Player</a>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script src="assets/js/easter-eggs.js"></script>
<script>
// ── BUILD BOARD ──
const ROW1 = 'ABCDEFGHIJKLM'.split('');
const ROW2 = 'NOPQRSTUVWXYZ'.split('');
const NUMS = '1234567890'.split('');

function buildBoard() {
  buildRow(ROW1, 'letters-row-1');
  buildRow(ROW2, 'letters-row-2');
  buildRow(NUMS, 'numbers-row');
}

function buildRow(chars, containerId) {
  const el = document.getElementById(containerId);
  chars.forEach(ch => {
    const span = document.createElement('span');
    span.className = 'board-key';
    span.id = 'key-' + ch;
    span.textContent = ch;
    el.appendChild(span);
  });
}

// ── PARTICLES ──
(function() {
  const canvas = document.getElementById('ouija-particles');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const COLORS = ['rgba(139,0,0,', 'rgba(100,0,100,', 'rgba(139,105,20,', 'rgba(60,0,60,'];
  let pts = [];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 50; i++) pts.push(mkPt());
  function mkPt() {
    return { x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.3, vy: -(Math.random() * 0.5 + 0.1),
      size: Math.random() * 2 + 0.5, alpha: Math.random() * 0.4 + 0.1,
      color: COLORS[Math.floor(Math.random() * COLORS.length)] };
  }

  (function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pts.forEach((p, i) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.alpha + ')'; ctx.fill();
      p.x += p.vx; p.y += p.vy; p.alpha -= 0.0006;
      if (p.y < -10 || p.alpha <= 0) pts[i] = { ...mkPt(), y: canvas.height + 5 };
    });
    requestAnimationFrame(animate);
  })();
})();

// ── PLANCHETTE ──
let litKey = null;
let seekInterval = null;
let busy = false;

// Interior letters used during the seeking animation — never YES/NO
const SEEK_CIRCUIT = ['G', 'M', 'T', 'S', 'H', 'P', 'N', 'F', 'R', 'L', 'D', 'W'];
// All letters available for organic wandering between target letters
const ALL_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let seekIdx = 0;

function keyCenter(id) {
  const key   = document.getElementById('key-' + id);
  const board = document.getElementById('spirit-board');
  if (!key || !board) return null;
  const kr = key.getBoundingClientRect();
  const br = board.getBoundingClientRect();
  return { x: kr.left - br.left + kr.width / 2, y: kr.top - br.top + kr.height / 2 };
}

function placePlanchette(id) {
  const pos = keyCenter(id);
  if (!pos) return;
  const p = document.getElementById('planchette');
  p.style.left = (pos.x - p.offsetWidth  / 2) + 'px';
  p.style.top  = (pos.y - p.offsetHeight / 2) + 'px';

  if (litKey) document.getElementById('key-' + litKey)?.classList.remove('lit');
  document.getElementById('key-' + id)?.classList.add('lit');
  litKey = id;
}

function showPlanchette() {
  const p = document.getElementById('planchette');
  const board = document.getElementById('spirit-board');
  // Fade in at centre with no movement transition
  p.style.transition = 'opacity 0.5s';
  p.style.left = (board.offsetWidth  / 2 - p.offsetWidth  / 2) + 'px';
  p.style.top  = (board.offsetHeight / 2 - p.offsetHeight / 2) + 'px';
  p.style.opacity = '1';
  // Restore movement transition after fade completes
  setTimeout(() => { p.style.transition = 'left 0.9s ease, top 0.9s ease, opacity 0.4s'; }, 520);
}

function startSeeking() {
  showPlanchette();
  document.getElementById('planchette').classList.add('seeking');
  // Always greet with HELLO first, then wander
  setTimeout(() => {
    placePlanchette('HELLO');
    setTimeout(() => {
      seekIdx = Math.floor(Math.random() * SEEK_CIRCUIT.length);
      seekInterval = setInterval(() => {
        placePlanchette(SEEK_CIRCUIT[seekIdx % SEEK_CIRCUIT.length]);
        seekIdx++;
      }, 950);
    }, 1000);
  }, 560);
}

function stopSeeking() {
  clearInterval(seekInterval);
  seekInterval = null;
  document.getElementById('planchette').classList.remove('seeking');
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function randLetter(exclude) {
  const pool = ALL_LETTERS.filter(l => l !== exclude);
  return pool[Math.floor(Math.random() * pool.length)];
}

async function spellOut(text) {
  const chars = text.replace(/[^A-Z ]/g, '').split('');
  for (const ch of chars) {
    if (ch === ' ') {
      await wait(500 + Math.random() * 300);
      continue;
    }
    // ~30% chance the planchette wanders to a wrong letter before finding the right one
    if (Math.random() < 0.3) {
      placePlanchette(randLetter(ch));
      await wait(700 + Math.random() * 400);
    }
    placePlanchette(ch);
    await wait(950 + Math.random() * 400);
  }
  await wait(400);
  placePlanchette('GOODBYE');
  await wait(1200);
}

// ── API ──
async function callOuija(question) {
  const res = await fetch('https://unique-ue-api.unique-ue-ai-proxy.workers.dev/ouija', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Worker error ' + res.status);
  return data.text || 'SILENCE';
}

// ── MAIN ──
async function askSpirits() {
  if (busy) return;
  const question = document.getElementById('spirit-question').value.trim();
  const errorEl  = document.getElementById('error-msg');
  errorEl.classList.remove('visible');

  if (!question) {
    errorEl.textContent = 'You must ask the spirits a question.';
    errorEl.classList.add('visible');
    const btn = document.getElementById('ask-btn');
    btn.classList.add('shake');
    setTimeout(() => btn.classList.remove('shake'), 400);
    return;
  }

  busy = true;
  const btn = document.getElementById('ask-btn');
  btn.disabled = true;

  // Clear previous response
  document.getElementById('response-eyebrow').classList.remove('visible');
  document.getElementById('response-answer').classList.remove('visible');
  document.getElementById('response-answer').textContent = '';
  if (litKey) { document.getElementById('key-' + litKey)?.classList.remove('lit'); litKey = null; }

  startSeeking();

  try {
    const answer = await callOuija(question);
    stopSeeking();
    await wait(300);
    await spellOut(answer);

    document.getElementById('response-answer').textContent = answer;
    document.getElementById('response-eyebrow').classList.add('visible');
    document.getElementById('response-answer').classList.add('visible');
  } catch (err) {
    stopSeeking();
    errorEl.textContent = 'The spirits cannot be reached: ' + err.message;
    errorEl.classList.add('visible');
  } finally {
    btn.disabled = false;
    busy = false;
  }
}

document.addEventListener('DOMContentLoaded', buildBoard);
</script>
</body>
</html>
